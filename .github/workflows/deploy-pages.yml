name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage deploy directory
        run: |
          set -euo pipefail
          mkdir -p _site_deploy/data
          cp -R site/. _site_deploy/
          cp data/latest.json _site_deploy/data/latest.json
          cp data/preferences.json _site_deploy/data/preferences.json
          cp data/topic_catalog.json _site_deploy/data/topic_catalog.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
